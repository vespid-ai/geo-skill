<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 420" width="960" height="420">
  <style>
    text { font-family: 'Helvetica Neue', Helvetica, Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif; }
  </style>
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/>
    </marker>
  </defs>

  <rect width="960" height="420" fill="#ffffff"/>
  <text x="40" y="46" font-size="28" font-weight="600" fill="#111827">geo-skill workflow</text>
  <text x="40" y="72" font-size="14" fill="#6b7280">A user-facing GEO workflow for benchmarking, auditing, improving, and shipping machine-readable product surfaces.</text>

  <g transform="translate(40,120)">
    <rect x="0" y="0" width="170" height="92" rx="12" ry="12" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
    <text x="20" y="32" font-size="18" font-weight="600" fill="#111827">1. Benchmark</text>
    <text x="20" y="56" font-size="13" fill="#374151">Use bundled fixtures or your</text>
    <text x="20" y="74" font-size="13" fill="#374151">own site as the baseline.</text>
    <text x="20" y="95" font-size="12" fill="#2563eb">geo-skill benchmarks list</text>
  </g>

  <g transform="translate(250,120)">
    <rect x="0" y="0" width="170" height="92" rx="12" ry="12" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
    <text x="20" y="32" font-size="18" font-weight="600" fill="#111827">2. Audit</text>
    <text x="20" y="56" font-size="13" fill="#374151">Check crawlability, page</text>
    <text x="20" y="74" font-size="13" fill="#374151">coverage, schema, and trust.</text>
    <text x="20" y="95" font-size="12" fill="#2563eb">audit / audit --url</text>
  </g>

  <g transform="translate(460,120)">
    <rect x="0" y="0" width="170" height="92" rx="12" ry="12" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
    <text x="20" y="32" font-size="18" font-weight="600" fill="#111827">3. Generate</text>
    <text x="20" y="56" font-size="13" fill="#374151">Create robots.txt, llms.txt,</text>
    <text x="20" y="74" font-size="13" fill="#374151">schema, and page starters.</text>
    <text x="20" y="95" font-size="12" fill="#16a34a">generate ...</text>
  </g>

  <g transform="translate(670,120)">
    <rect x="0" y="0" width="170" height="92" rx="12" ry="12" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5"/>
    <text x="20" y="32" font-size="18" font-weight="600" fill="#111827">4. Compare</text>
    <text x="20" y="56" font-size="13" fill="#374151">Measure score delta, coverage</text>
    <text x="20" y="74" font-size="13" fill="#374151">gains, and resolved issues.</text>
    <text x="20" y="95" font-size="12" fill="#2563eb">compare before after</text>
  </g>

  <path d="M210 166 C225 166 235 166 250 166" stroke="#2563eb" stroke-width="2.5" fill="none" marker-end="url(#arrow-blue)"/>
  <path d="M420 166 C435 166 445 166 460 166" stroke="#16a34a" stroke-width="2.5" fill="none" marker-end="url(#arrow-green)"/>
  <path d="M630 166 C645 166 655 166 670 166" stroke="#2563eb" stroke-width="2.5" fill="none" marker-end="url(#arrow-blue)"/>

  <g transform="translate(170,280)">
    <rect x="0" y="0" width="620" height="86" rx="14" ry="14" fill="#ffffff" stroke="#d1d5db" stroke-dasharray="6,4" stroke-width="1.5"/>
    <text x="24" y="30" font-size="18" font-weight="600" fill="#111827">External-user outcomes</text>
    <text x="24" y="54" font-size="14" fill="#374151">• Clearer AI-search visibility for products and docs</text>
    <text x="24" y="74" font-size="14" fill="#374151">• Shareable markdown / SARIF reports for teams and CI</text>
    <text x="360" y="54" font-size="14" fill="#374151">• Faster site migrations and GEO iteration loops</text>
    <text x="360" y="74" font-size="14" fill="#374151">• Reusable skills for Hermes / Claude / Codex</text>
  </g>

  <g transform="translate(40,386)">
    <line x1="0" y1="0" x2="28" y2="0" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arrow-blue)"/>
    <text x="36" y="5" font-size="12" fill="#6b7280">audit / compare flow</text>
    <line x1="180" y1="0" x2="208" y2="0" stroke="#16a34a" stroke-width="2.5" marker-end="url(#arrow-green)"/>
    <text x="216" y="5" font-size="12" fill="#6b7280">asset generation flow</text>
  </g>
</svg>
